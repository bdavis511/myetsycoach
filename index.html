.messages{flex:1;overflow-y:auto;padding:14px 14px 10px;display:flex;flex-direction:column;gap:10px;position:relative;z-index:1;-webkit-overflow-scrolling:touch}
.msg{max-width:84%;padding:11px 15px;font-size:14px;line-height:1.55;word-wrap:break-word}
.msg.bot{background:rgba(255,255,255,0.95);color:#1a1a1a;align-self:flex-start;border-radius:6px 20px 20px 20px;border:1px solid rgba(0,0,0,0.06)}
.msg.user{background:#e57527;color:#fff;align-self:flex-end;border-radius:20px 6px 20px 20px}
.msg.error{background:rgba(255,243,243,0.95);color:#c0392b;align-self:flex-start;border-radius:6px 20px 20px 20px;font-size:12px}

.starters{padding:8px 14px 10px;display:flex;flex-direction:column;gap:7px;position:relative;z-index:1}
.starter-btn{background:rgba(255,255,255,0.88);border:1.5px solid #e57527;color:#c45e10;border-radius:24px;padding:9px 16px;font-size:13px;cursor:pointer;text-align:left;line-height:1.3;font-family:inherit}
.starter-btn:active{background:#ffdfc7}

.input-area{background:rgba(255,255,255,0.96);border-top:1px solid rgba(0,0,0,0.08);padding:10px 12px;flex-shrink:0;position:relative;z-index:2;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.input-row{display:flex;gap:8px;align-items:center}
.input-row input{flex:1;border:1.5px solid #e0d8d2;border-radius:24px;padding:10px 16px;font-size:15px;outline:none;background:#f7f7f7;color:#1a1a1a;font-family:inherit;-webkit-appearance:none}
.input-row input:focus{border-color:#e57527}
.send-btn{background:#e57527;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn svg{width:17px;height:17px;fill:#fff}

.typing{display:flex;gap:4px;align-items:center;padding:10px 14px;background:rgba(255,255,255,0.95);border-radius:6px 20px 20px 20px;align-self:flex-start;width:54px;position:relative;z-index:1}
.dot{width:7px;height:7px;background:#ccc;border-radius:50%;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0.3}40%{opacity:1}}
.powered{text-align:center;font-size:11px;color:#bbb;padding:4px 0 2px;background:rgba(255,255,255,0.96);position:relative;z-index:2}
</style>

<script>
const SYSTEM = `You are My Etsy Coach, an expert AI assistant built specifically for students learning to start and grow a print-on-demand business on Etsy. You were created by Bianca, an entrepreneur who teaches everyday women how to build Etsy POD businesses using Printify, eRank, Canva, and Creative Fabrica POD assets.

TOOLS YOU COVER: Etsy, Printify, eRank, Canva, Creative Fabrica POD assets. Stay focused on these.

const msgs = document.getElementById('messages');
const starters = document.getElementById('starters');
const input = document.getElementById('userInput');
let history = [];

input.addEventListener('keydown', function(e){ if(e.key==='Enter') sendMsg(); });
function scrollDown(){ msgs.scrollTop = msgs.scrollHeight; }

function addMsg(text, role){
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  msgs.appendChild(d);
  scrollDown();
}

function showTyping(){
  const d = document.createElement('div');
  d.className = 'typing'; d.id = 'typing';
  d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  msgs.appendChild(d);
  scrollDown();
}

function hideTyping(){ const t = document.getElementById('typing'); if(t) t.remove(); }

function askStarter(btn){
  starters.style.display = 'none';
  sendQuestion(btn.textContent);
}

function sendMsg(){
  const q = input.value.trim();
  if(!q) return;
  input.value = '';
  starters.style.display = 'none';
  sendQuestion(q);
}

async function sendQuestion(q){
  addMsg(q, 'user');
  history.push({role:'user', content:q});
  showTyping();
  try{
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    hideTyping();
    if(data.error){
      addMsg('Error: ' + data.error.type + ' — ' + data.error.message, 'error');
      return;
    }
    const reply = data.content?.[0]?.text || "Something went wrong. Try again!";
    addMsg(reply, 'bot');
    history.push({role:'assistant', content:reply});
  } catch(e){
    hideTyping();
    addMsg('Error: ' + e.message, 'error');
  }
}
</script>
