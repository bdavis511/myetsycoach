<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="My Etsy Coach"/>
<title>My Etsy Coach</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{display:flex;flex-direction:column;height:100dvh;background:#f5f0eb;font-family:system-ui,-apple-system,sans-serif}
.app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;width:100%;background:#fff}
.hero{background:#e57527;display:flex;align-items:flex-end;gap:12px;padding:16px 16px 0;flex-shrink:0;min-height:130px}
.hero-img{width:90px;height:114px;object-fit:cover;object-position:top center;border-radius:10px 10px 0 0;flex-shrink:0;display:block}
.hero-text{padding-bottom:14px;flex:1}
.hero-text h1{color:#fff;font-size:19px;font-weight:700;line-height:1.2;margin-bottom:5px}
.hero-text p{color:#ffdfc7;font-size:12px;line-height:1.4}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:#fafafa;-webkit-overflow-scrolling:touch}
.msg{max-width:84%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.55;word-wrap:break-word}
.msg.bot{background:#fff;color:#1a1a1a;border:1px solid #ececec;align-self:flex-start;border-radius:4px 16px 16px 16px}
.msg.user{background:#e57527;color:#fff;align-self:flex-end;border-radius:16px 4px 16px 16px}
.msg.error{background:#fff3f3;color:#c0392b;border:1px solid #f5c6cb;align-self:flex-start;border-radius:4px 16px 16px 16px;font-size:12px}
.starters{padding:10px 14px;display:flex;flex-direction:column;gap:7px;background:#fafafa;flex-shrink:0}
.starter-btn{background:#fff;border:1.5px solid #e57527;color:#c45e10;border-radius:20px;padding:9px 15px;font-size:13px;cursor:pointer;text-align:left;line-height:1.3;font-family:inherit}
.starter-btn:active{background:#ffdfc7}
.input-area{background:#fff;border-top:1px solid #ececec;padding:10px 12px;flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.input-row{display:flex;gap:8px;align-items:center}
.input-row input{flex:1;border:1.5px solid #e0d8d2;border-radius:22px;padding:10px 16px;font-size:15px;outline:none;background:#fafafa;color:#1a1a1a;font-family:inherit;-webkit-appearance:none}
.input-row input:focus{border-color:#e57527}
.send-btn{background:#e57527;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn svg{width:17px;height:17px;fill:#fff}
.typing{display:flex;gap:4px;align-items:center;padding:10px 14px;background:#fff;border:1px solid #ececec;border-radius:4px 16px 16px 16px;align-self:flex-start;width:54px}
.dot{width:7px;height:7px;background:#ccc;border-radius:50%;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0.3}40%{opacity:1}}
.powered{text-align:center;font-size:11px;color:#bbb;padding:4px 0 2px;background:#fff}
</style>
</head>

    <div class="hero-text">
      <h1>My Etsy Coach</h1>
      <p>Your on-demand Etsy POD assistant. Ask me anything.</p>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="msg bot">Hey! Ask me anything about starting or growing your Etsy print-on-demand shop.</div>
  </div>
  <div class="starters" id="starters">
    <button class="starter-btn" onclick="askStarter(this)">How do I find what's actually selling on Etsy right now?</button>
    <button class="starter-btn" onclick="askStarter(this)">How do I set up Printify with my Etsy shop?</button>
    <button class="starter-btn" onclick="askStarter(this)">What should my first product be?</button>
    <button class="starter-btn" onclick="askStarter(this)">How do I use eRank to find good keywords?</button>
  </div>
  <div class="input-area">
    <div class="input-row">
      <input type="text" id="userInput" placeholder="Ask a question..." autocomplete="off" autocorrect="off"/>
      <button class="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
  <div class="powered">Powered by AI</div>
</div>
<script>
const SYSTEM = `You are My Etsy Coach, an expert AI assistant built specifically for students learning to start and grow a print-on-demand business on Etsy. You were created by Bianca, an entrepreneur who teaches everyday women how to build Etsy POD businesses using Printify, eRank, Canva, and Creative Fabrica POD assets.

Your focus is demand-driven strategy: keywords, search behavior, strong listings, and simple systems with no inventory required.

TOOLS YOU COVER: Etsy, Printify, eRank, Canva, Creative Fabrica POD assets. Stay focused on these.

TONE: Casual, smart, conversational, confident, and direct. Sound like a knowledgeable friend talking, not a corporate chatbot. Make complex things feel simple and doable. Use language like "this is where people mess up," "what actually matters," "stop guessing," "demand-driven," "what people are already searching for." Never motivational-speaker energy.

AUDIENCE: Primarily everyday women working jobs and raising families who want side income or full freedom. Always answer for both beginners and people already selling. Give the beginner-friendly foundation first, then the next-level tip for people already in it.

ANSWER STYLE: Be practical and specific. No fluff. Give real steps, real examples, real numbers where possible.

IF YOU DON'T KNOW: Tell them honestly and say: "For this one, send Bianca a private message in the Skool community and she will point you in the right direction personally."

NEVER use: blueprint, alignment, quantum, manifest, girlboss, crushing it, unlock, dominate, CEO energy, level up. Never use em dashes or hyphens as punctuation. Keep it human, never robotic.`;

const msgs = document.getElementById('messages');
const starters = document.getElementById('starters');
const input = document.getElementById('userInput');
let history = [];

input.addEventListener('keydown', function(e){ if(e.key==='Enter') sendMsg(); });
function scrollDown(){ msgs.scrollTop = msgs.scrollHeight; }

function addMsg(text, role){
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = text;
  msgs.appendChild(d);
  scrollDown();
}

function showTyping(){
  const d = document.createElement('div');
  d.className = 'typing'; d.id = 'typing';
  d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  msgs.appendChild(d);
  scrollDown();
}

function hideTyping(){ const t = document.getElementById('typing'); if(t) t.remove(); }

function askStarter(btn){
  starters.style.display = 'none';
  sendQuestion(btn.textContent);
}

function sendMsg(){
  const q = input.value.trim();
  if(!q) return;
  input.value = '';
  starters.style.display = 'none';
  sendQuestion(q);
}

async function sendQuestion(q){
  addMsg(q, 'user');
  history.push({role:'user', content:q});
  showTyping();
  try{
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    hideTyping();
    if(data.error){
      addMsg('Error: ' + data.error.type + ' — ' + data.error.message, 'error');
      return;
    }
    const reply = data.content?.[0]?.text || "Something went wrong. Try again!";
    addMsg(reply, 'bot');
    history.push({role:'assistant', content:reply});
  } catch(e){
    hideTyping();
    addMsg('Error: ' + e.message, 'error');
  }
}
</script>
</body>
</html>
